<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff385c"/>
      <stop offset="100%" stop-color="#c62828"/>
    </linearGradient>
    <linearGradient id="grass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7cb87c"/>
      <stop offset="100%" stop-color="#4a8f4a"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="96" cy="96" r="96" fill="url(#bg)"/>
  <!-- Castle -->
  <g transform="translate(96, 96)">
    <!-- Castle walls -->
    <rect x="-30" y="-10" width="60" height="50" fill="#f5e6d3" stroke="#5a4a3a" stroke-width="2"/>
    <!-- Roof -->
    <path d="M -40 -10 Q 0 -28 40 -10 L 40 -5 L -40 -5 Z" fill="#c63a3a" stroke="#8a2828" stroke-width="1.5"/>
    <!-- Top -->
    <rect x="-15" y="-40" width="30" height="15" fill="#f5e6d3" stroke="#5a4a3a" stroke-width="2"/>
    <path d="M -20 -40 Q 0 -52 20 -40 L 20 -35 L -20 -35 Z" fill="#c63a3a" stroke="#8a2828" stroke-width="1.5"/>
    <!-- Flag -->
    <line x1="0" y1="-60" x2="0" y2="-48" stroke="#222" stroke-width="1.5"/>
    <path d="M 0 -55 L 12 -52 L 12 -47 L 0 -44 Z" fill="#ff385c"/>
    <!-- Door -->
    <path d="M -8 40 L -8 22 Q 0 16 8 22 L 8 40 Z" fill="#3a2820"/>
    <!-- Kanji 日 on door -->
    <rect x="-5" y="22" width="10" height="14" fill="none" stroke="#fff" stroke-width="0.8"/>
    <line x1="-5" y1="29" x2="5" y2="29" stroke="#fff" stroke-width="0.8"/>
  </g>
  <!-- Grass at bottom -->
  <ellipse cx="96" cy="180" rx="80" ry="8" fill="url(#grass)" opacity="0.6"/>
</svg>
